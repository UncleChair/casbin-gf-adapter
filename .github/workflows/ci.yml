name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Use the Go version declared in go.mod.
          go-version-file: go.mod
          cache: true

      - name: Run go test
        run: go test ./...
